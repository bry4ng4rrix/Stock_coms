version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: stock_backend
    command: daphne -b 0.0.0.0 -p 8000 Stock.asgi:application
    volumes:
      - .:/app          # mount project so SQLite file is accessible
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: stock_frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
